<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amra.jp ｜ home</title>
<meta name="description" content="amra.jp にようこそ。">
<link rel="icon" href="images/amra.png">

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/page-home.css">
<link rel="stylesheet" href="css/page-work.css">
</head>
<body>

<!-- ============================================================
     ヘッダーは partials/header.html を読み込んで表示します。
     ★ ナビの項目・SNSリンク・SHOPのURLを変更したい場合は、
       このファイルではなく partials/header.html を編集してください。
       1回の編集で home / work / about / contact すべてに反映されます。
============================================================= -->
<div data-include="partials/header.html"></div>

<main>
  <!-- ==================== キービジュアル ====================
       ★ ページを開いてすぐに表示される画像です。
       画像を差し替えるには images/hero.jpg を上書きするか、
       下の src="images/hero.jpg" のパスを変更してください。
  ================================================= -->
  <section class="hero-visual">
    <div class="hero-visual-frame">
      <img src="images/hero.png" alt="Key Visual">
    </div>

    <!--　吹き出し(複数対応)
         キービジュアルに重なる吹き出し(SVG path)+テキストのタイプライター表示。
         吹き出しはドラッグで移動でき(離すと勢いよく飛ぶ)、足の部分は常にtarget
         (hero.pngか他の吹き出し)の中心を向くよう js/hero-bubbles.js が毎フレーム
         再計算しています。吹き出しの数・文章・追従先は js/hero-bubbles-data.js の
         HERO_BUBBLES 配列を編集してください(このdivの中身はJSが自動で生成します)。 -->
    <div class="hero-bubbles" data-hero-bubbles></div>
  </section>

  <div class="home-margin">
    
  </div>

  <!-- ==================== workギャラリー(プレビュー) ====================
       ★ 作品の追加・編集は js/works-data.js だけでOKです。
       このHTMLは自動で組み立てられるので、書き換え不要です。
  ================================================= -->
  <section class="home-work">
    
    <div class="wrap">
      <div class="work-grid" data-work-grid data-limit="4">
        <!-- js/main.js が works-data.js の内容から自動生成します -->
      </div>
    </div>
  </section>
</main>

<!-- ポップアップ(作品クリックで表示) -->
<div class="work-modal" data-work-modal>
  <button class="work-modal-nav work-modal-prev" data-modal-prev aria-label="前の作品"><</button>
  <div class="work-modal-inner">
    <img data-modal-img src="" alt="">
    <div class="work-modal-body">
      <p class="title"><span data-modal-title></span></p>
      <p class="meta"><span data-modal-meta></span></p>
      <p class="desc"><span data-modal-desc></span></p>
    </div>
  </div>
  <button class="work-modal-nav work-modal-next" data-modal-next aria-label="次の作品">></button>
  <button class="work-modal-close" data-modal-close aria-label="閉じる">close</button>
</div>

<div data-include="partials/footer.html"></div>

<script src="js/works-data.js"></script>
<script src="js/hero-bubbles-data.js"></script>
<script src="js/hero-bubbles.js"></script>
<script src="js/main.js"></script>
</body>
</html>
